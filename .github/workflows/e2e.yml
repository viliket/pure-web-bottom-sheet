name: E2E tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Chrome for Testing has no linux-arm64 binaries (only linux64/x86-64),
          # so WebDriverIO auto-download falls back to the x86-64 chromedriver
          # which cannot run on ARM. See https://issues.chromium.org/issues/374811603
          - os: ubuntu-24.04
            browser: chrome@stable
          - os: ubuntu-24.04
            browser: chrome@latest
          - os: ubuntu-24.04-arm
            browser: firefox@stable
          - os: ubuntu-24.04-arm
            browser: firefox@latest
          - os: ubuntu-24.04-arm
            browser: minibrowser
          - os: macos-26
            browser: safari
    runs-on: ${{ matrix.os }}
    name: E2E (${{ matrix.browser }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          check-latest: true

      - run: npm ci

      - run: npm run build

      - name: Install WebKitGTK
        if: matrix.browser == 'minibrowser'
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-driver

      - name: Run e2e tests
        if: matrix.browser != 'minibrowser'
        run: npm run test:wdio
        env:
          BROWSERS: ${{ matrix.browser }}

      - name: Run e2e tests (MiniBrowser)
        if: matrix.browser == 'minibrowser'
        run: xvfb-run npm run test:wdio
        env:
          BROWSERS: minibrowser
